tags:
  - Contacts
summary: Update the contact
operationId: updateContact
description: This endpoint allows to update the contact with payload.
security:
  - bearerAuth: []
parameters:
  - in: path
    name: contactId
    required: true
    schema:
      type: string
      example: '65ca67e7ae7f10c88b598384'
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            type: string
            description: Contact name
            example: 'John Doe'
          email:
            type: string
            description: Contact email
            example: 'john.doe@example.com'
          phoneNumber:
            type: string
            description: Contact phone number
            example: '+380000087807'
          isFavourite:
            type: boolean
            description: Favourite contact true/false
            default: false
          contactType:
            type: string
            enum: ['work', 'home', 'personal']
            description: Type of contact
            example: 'work'
          photo:
            type: string
            format: binary
            description: Contact photo (optional)
responses:
  '200':
    description: Update the contact
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully updated a contact
            data:
              type: object
              $ref: ../../../components/schemas/contact.yaml
  '400':
    $ref: '../../../components/responses/400.yaml'
  '401':
    $ref: ../../../components/responses/401.yaml
  '404':
    $ref: '../../../components/responses/404.yaml'
  '500':
    $ref: ../../../components/responses/500.yaml