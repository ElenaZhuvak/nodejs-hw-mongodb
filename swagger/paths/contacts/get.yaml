tags:
  - Contacts
summary: Get a list of contacts
operationId: getContacts
description: Retrieve a list of contacts with optional filtering.
security:
  - bearerAuth: []
parameters:
  - $ref: '../../components/parameters/page.yaml'
  - $ref: '../../components/parameters/perPage.yaml'
  - $ref: '../../components/parameters/sortBy.yaml'
  - $ref: '../../components/parameters/sortOrder.yaml'
  - $ref: '../../components/parameters/contactType.yaml'
  - $ref: '../../components/parameters/isFavourite.yaml'
responses:
  '200':
    description: Successfully found contacts
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully found contacts!
            data:
              type: array
              items: 
                $ref: ../../components/schemas/contact.yaml
  '400':
    $ref: '../../components/responses/400.yaml'
  '401':
    $ref: '../../components/responses/401.yaml'
  '500':
    $ref: ../../components/responses/500.yaml