tags:
  - Contacts
summary: Create a new contact
operationId: createContact
description: This endpoint allows to create a new contact with payload.
security:
  - bearerAuth: []
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        required:
          - name
          - email
          - phoneNumber
        properties:
          name:
            type: string
            description: Contact name
            example: 'John Doe'
          email:
            type: string
            description: Contact email
            example: 'john.doe@example.com'
          phoneNumber:
            type: string
            description: Contact phone number
            example: '+380000087807'
          isFavourite:
            type: boolean
            description: Favourite contact true/false
            default: false
          contactType:
            type: string
            enum: ['work', 'home', 'personal']
            description: Type of contact
            example: 'work'
          photo:
            type: string
            format: binary
            description: Contact photo (optional)
responses:
  '201':
    description: Created a contact
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 201
            message:
              type: string
              example: Successfully created a contact!
            data:
              type: object
              $ref: ../../components/schemas/contact.yaml
  '401':
    $ref: ../../components/responses/401.yaml
  '400':
    $ref: '../../components/responses/400.yaml'
  '500':
    $ref: ../../components/responses/500.yaml